name: 'AISquare Studio AutoQA'
description: 'AI-powered test generation with metadata-driven organization (flow_name, tier, area) using CrewAI + Playwright'
author: 'AISquare Studio'

branding:
  icon: 'zap'
  color: 'blue'

inputs:
  openai-api-key:
    description: 'OpenAI API key for test generation'
    required: true
  
  qa-github-token:
    description: 'GitHub token with access to AutoQA repository (required for private repos)'
    required: false
    default: ${{ github.token }}
  
  staging-url:
    description: 'Staging environment URL for testing'
    required: true
  
  staging-email:
    description: 'Test email for staging environment login'
    required: false
    default: 'test@example.com'
  
  staging-password:
    description: 'Test password for staging environment login'
    required: false
    default: 'password123'
  
  target-repo-path:
    description: 'Path to the target repository (usually ".")'
    required: false
    default: '.'
  
  git-user-name:
    description: 'Git user name for commits'
    required: false
    default: 'AutoQA Bot'
  
  git-user-email:
    description: 'Git user email for commits'
    required: false
    default: 'rabia.tahirr@opengrowth.com'
  
  pr-body:
    description: 'Pull request description to parse for AutoQA metadata block (```autoqa\nflow_name: ...\ntier: ...\n```)'
    required: false
    default: ${{ github.event.pull_request.body }}
  
  test-directory:
    description: 'Base directory for generated tests (will create tests/autoqa/{tier}/{area}/test_{flow_name}.py structure)'
    required: false
    default: 'tests/autoqa'
  
  create-pr:
    description: 'Create a pull request instead of pushing directly to main branch'
    required: false
    default: 'false'
  
  execution-mode:
    description: 'Mode of operation: "generate" (new test only), "suite" (run all tests), or "all" (generate + run all)'
    required: false
    default: 'generate'

outputs:
  test_generated:
    description: 'Whether a test was successfully generated'
    value: ${{ steps.autoqa.outputs.test_generated }}
  
  test_file_path:
    description: 'Path to the generated test file (e.g., tests/autoqa/A/auth/test_user_login.py)'
    value: ${{ steps.autoqa.outputs.test_file_path }}
  
  test_results:
    description: 'JSON string of test execution results'
    value: ${{ steps.autoqa.outputs.test_results }}
  
  generation_metadata:
    description: 'JSON string of test generation metadata (includes flow_name, tier, area, etag, steps)'
    value: ${{ steps.autoqa.outputs.generation_metadata }}
  
  screenshot_path:
    description: 'Path to the generated screenshot'
    value: ${{ steps.autoqa.outputs.screenshot_path }}
  
  etag:
    description: 'ETag hash for idempotency (SHA256 of metadata + steps)'
    value: ${{ steps.autoqa.outputs.etag }}
  
  flow_name:
    description: 'Flow name from AutoQA metadata'
    value: ${{ steps.autoqa.outputs.flow_name }}
  
  tier:
    description: 'Test tier from AutoQA metadata (A, B, or C)'
    value: ${{ steps.autoqa.outputs.tier }}
  
  area:
    description: 'Test area from AutoQA metadata (optional)'
    value: ${{ steps.autoqa.outputs.area }}
  
  error:
    description: 'Error message if test generation or validation failed'
    value: ${{ steps.autoqa.outputs.error }}

runs:
  using: 'composite'
  steps:
    # Cache the AutoQA action repository to avoid repeated clones
    - name: 🗂️ Cache AutoQA Repository
      uses: actions/cache@v3
      with:
        path: .autoqa-action
        key: ${{ runner.os }}-autoqa-repo-${{ github.sha }}-v1
        restore-keys: |
          ${{ runner.os }}-autoqa-repo-v1
          
    - name: 🔍 Checkout AutoQA Action Repository
      uses: actions/checkout@v4
      with:
        repository: 'AISquare-Studio/AISquare-Studio-QA'
        token: ${{ inputs.qa-github-token }}
        path: '.autoqa-action'
        ref: ${{ github.action_ref || 'main' }}
    
    # Setup Python with pip caching based on requirements.txt hash
    - name: 🐍 Setup Python Environment
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: '.autoqa-action/requirements.txt'
    
    # Cache Playwright browsers to avoid downloading ~100MB each run
    - name: 🎭 Cache Playwright Browsers
      uses: actions/cache@v3
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-autoqa-playwright-${{ hashFiles('.autoqa-action/requirements.txt') }}-v2
        restore-keys: |
          ${{ runner.os }}-autoqa-playwright-v2
          ${{ runner.os }}-playwright-v2
          ${{ runner.os }}-playwright-
    
    # Install Python dependencies (pip packages cached above)
    - name: 📦 Install AutoQA Dependencies
      shell: bash
      run: |
        cd .autoqa-action
        pip install -r requirements.txt
        
    # Only install browsers if not cached (saves ~2-3 minutes per run)
    - name: 🎭 Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        cd .autoqa-action
        playwright install chromium
        playwright install-deps chromium
    
    # For cached browsers, only install system dependencies
    - name: 🎭 Setup Playwright (cached browsers)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        cd .autoqa-action
        playwright install-deps chromium
    
    - name: 🤖 Execute AutoQA Workflow
      id: autoqa
      shell: bash
      run: |
        cd .autoqa-action
        python src/autoqa/action_runner.py
      env:
        # Core configuration
        GITHUB_TOKEN: ${{ github.token }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        STAGING_URL: ${{ inputs.staging-url }}
        STAGING_EMAIL: ${{ inputs.staging-email }}
        STAGING_PASSWORD: ${{ inputs.staging-password }}
        
        # Action inputs as environment variables
        TARGET_REPO_PATH: ${{ inputs.target-repo-path }}
        GIT_USER_NAME: ${{ inputs.git-user-name }}
        GIT_USER_EMAIL: ${{ inputs.git-user-email }}
        PR_BODY: ${{ inputs.pr-body }}
        TEST_DIRECTORY: ${{ inputs.test-directory }}
        CREATE_PR: ${{ inputs.create-pr }}
        EXECUTION_MODE: ${{ inputs.execution-mode }}
        
        # GitHub context for cross-repo operations
        TARGET_REPOSITORY: ${{ github.repository }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
        GITHUB_SHA: ${{ github.sha }}
        
        # Action working directory
        ACTION_PATH: ${{ github.workspace }}/.autoqa-action
    
    - name: 📸 Upload Screenshots as Artifacts
      if: always() && steps.autoqa.outputs.test_generated == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: autoqa-screenshots-${{ github.run_number }}
        path: |
          .autoqa-action/reports/screenshots/*.png
          ${{ github.workspace }}/reports/screenshots/*.png
        if-no-files-found: warn
        retention-days: 30
    
    - name: 📊 Upload Test Reports
      if: always() && steps.autoqa.outputs.test_generated == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: autoqa-reports-${{ github.run_number }}
        path: |
          .autoqa-action/reports/**
          ${{ github.workspace }}/reports/**
          ${{ inputs.test-directory }}/**
        if-no-files-found: warn
        retention-days: 30
