name: 'AISquare Studio AutoQA'
description: 'AI-powered test generation and execution using CrewAI + Playwright'
author: 'AISquare Studio'

branding:
  icon: 'zap'
  color: 'blue'

inputs:
  openai-api-key:
    description: 'OpenAI API key for test generation'
    required: true
  
  staging-url:
    description: 'Staging environment URL for testing'
    required: true
  
  target-repo-path:
    description: 'Path to the target repository (usually ".")'
    required: false
    default: '.'
  
  git-user-name:
    description: 'Git user name for commits'
    required: false
    default: 'AutoQA Bot'
  
  git-user-email:
    description: 'Git user email for commits'
    required: false
    default: 'rabia.tahirr@opengrowth.com'
  
  pr-body:
    description: 'Pull request description to parse for AutoQA steps'
    required: false
    default: ${{ github.event.pull_request.body }}
  
  test-directory:
    description: 'Directory to store generated tests'
    required: false
    default: 'tests/generated'

outputs:
  test-generated:
    description: 'Whether a test was successfully generated'
    value: ${{ steps.autoqa.outputs.test-generated }}
  
  test-file-path:
    description: 'Path to the generated test file'
    value: ${{ steps.autoqa.outputs.test-file-path }}
  
  test-results:
    description: 'JSON string of test execution results'
    value: ${{ steps.autoqa.outputs.test-results }}

runs:
  using: 'composite'
  steps:
    - name: 🔍 Checkout AutoQA Action Repository
      uses: actions/checkout@v4
      with:
        repository: 'AISquare-Studio/AISquare-Studio-QA'
        path: '.autoqa-action'
        ref: 'main'
    
    - name: 🐍 Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: '.autoqa-action/requirements.txt'
    
    - name: 📦 Install AutoQA Dependencies
      shell: bash
      run: |
        cd .autoqa-action
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps chromium
    
    - name: 🤖 Execute AutoQA Workflow
      id: autoqa
      shell: bash
      run: |
        cd .autoqa-action
        python src/autoqa/action_runner.py
      env:
        # Core configuration
        GITHUB_TOKEN: ${{ github.token }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        STAGING_URL: ${{ inputs.staging-url }}
        
        # Action inputs as environment variables
        TARGET_REPO_PATH: ${{ inputs.target-repo-path }}
        GIT_USER_NAME: ${{ inputs.git-user-name }}
        GIT_USER_EMAIL: ${{ inputs.git-user-email }}
        PR_BODY: ${{ inputs.pr-body }}
        TEST_DIRECTORY: ${{ inputs.test-directory }}
        
        # GitHub context for cross-repo operations
        TARGET_REPOSITORY: ${{ github.repository }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
        GITHUB_SHA: ${{ github.sha }}
        
        # Action working directory
        ACTION_PATH: ${{ github.workspace }}/.autoqa-action