test_scenarios:
  login:
    valid_login:
      name: "Valid Login Test"
      description: "Test successful login with correct credentials"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address"
        - "Enter valid password"
        - "Click login button"
        - "Verify successful login (check for dashboard/profile page)"
      expected_result: "User should be logged in successfully"
      
    invalid_login:
      name: "Invalid Login Test"
      description: "Test failed login with incorrect password"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address"
        - "Enter invalid password"
        - "Click login button"
        - "Verify error message is displayed"
      expected_result: "Error message should be shown for invalid credentials"

  create_studio:
    create_studio_basic:
      name: "Create Studio Test"
      description: "Test that a new studio can be created successfully through the UI"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address"
        - "Enter valid password"
        - "Click login button"
        - "Verify successful login (check for dashboard/home page)"
        - "Navigate to studio creation page (click 'Create Studio' or equivalent button)"
        - "Enter a studio name"
        - "Enter a studio description"
        - "Configure any required studio settings"
        - "Click the create/submit button to create the studio"
        - "Verify the studio was created successfully (check for success message or redirect to the new studio page)"
      expected_result: "Studio should be created successfully and user should see confirmation or be redirected to the new studio"

    create_studio_empty_name:
      name: "Create Studio With Empty Name Test"
      description: "Test that creating a studio without a name shows a validation error"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address"
        - "Enter valid password"
        - "Click login button"
        - "Verify successful login"
        - "Navigate to studio creation page"
        - "Leave the studio name field empty"
        - "Click the create/submit button"
        - "Verify that a validation error is displayed for the missing studio name"
      expected_result: "Validation error should be shown indicating that the studio name is required"

  studio_manager:
    # --- Page rendering tests (small, focused) ---
    page_loads_successfully:
      name: "Studio Manager Page Loads"
      description: "Verify that the studio manager page loads without errors after login"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the Studio Manager page"
        - "Verify the Studio Manager page has loaded (check for the page title or main heading)"
      expected_result: "Studio Manager page should load and display its main heading or title"

    header_section_renders:
      name: "Studio Manager Header Renders"
      description: "Verify the header section of Studio Manager renders with title and action buttons"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the Studio Manager page"
        - "Verify the page header area is visible (title text, any action buttons like 'Create Studio')"
      expected_result: "Header section should be visible with title text and action buttons"

    studio_list_section_renders:
      name: "Studio Manager List Section Renders"
      description: "Verify the main studio list or grid area renders with studio items"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the Studio Manager page"
        - "Verify the main content area is visible (studio cards, list items, or grid of studios)"
        - "Verify at least one studio item is displayed, or an empty state message is shown"
      expected_result: "Studio list/grid section should render with studio items or an empty state"

    sidebar_navigation_renders:
      name: "Studio Manager Sidebar Renders"
      description: "Verify the sidebar or navigation panel renders within Studio Manager"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the Studio Manager page"
        - "Verify the sidebar or left navigation panel is visible"
        - "Verify sidebar contains navigation links or menu items"
      expected_result: "Sidebar or navigation panel should be visible with menu items"

    # --- Tab rendering tests (one per tab to isolate failures) ---
    default_tab_is_active:
      name: "Studio Manager Default Tab Active"
      description: "Verify that the default/first tab is active when the page loads"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the Studio Manager page"
        - "Verify that tabs are visible in the Studio Manager"
        - "Verify the first/default tab is in an active or selected state"
        - "Verify the content area corresponding to the default tab is visible"
      expected_result: "Default tab should be active and its content should be displayed"

    second_tab_renders:
      name: "Studio Manager Second Tab Renders"
      description: "Verify the second tab can be clicked and its content renders"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the Studio Manager page"
        - "Verify that tabs are visible"
        - "Click on the second tab"
        - "Verify the second tab becomes active or selected"
        - "Verify the content area updates to show the second tab's content"
      expected_result: "Second tab should become active and display its content"

    third_tab_renders:
      name: "Studio Manager Third Tab Renders"
      description: "Verify the third tab can be clicked and its content renders"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the Studio Manager page"
        - "Verify that tabs are visible"
        - "Click on the third tab"
        - "Verify the third tab becomes active or selected"
        - "Verify the content area updates to show the third tab's content"
      expected_result: "Third tab should become active and display its content"

    tab_switching_preserves_state:
      name: "Studio Manager Tab Switching Works"
      description: "Verify switching between tabs works and each tab renders its own content"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the Studio Manager page"
        - "Note the content displayed in the default tab"
        - "Click on the second tab and verify its content loads"
        - "Click back on the first tab and verify it still displays its content"
      expected_result: "Switching between tabs should show different content and switching back should restore the previous tab's content"

    # --- Search tests ---
    search_input_visible:
      name: "Studio Manager Search Input Visible"
      description: "Verify the search input field is present and interactable"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the Studio Manager page"
        - "Verify a search input field is visible on the page"
        - "Click on the search input to verify it is interactable"
      expected_result: "Search input should be visible and focusable"

    search_filters_studios:
      name: "Studio Manager Search Filters Results"
      description: "Verify typing in the search bar filters the displayed studios"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the Studio Manager page"
        - "Observe the initial number of studio items displayed"
        - "Click on the search input field"
        - "Type a search query (e.g., a partial studio name)"
        - "Verify the displayed studios update to match the search query"
      expected_result: "Studio list should filter to show only studios matching the search query"

    search_no_results_state:
      name: "Studio Manager Search No Results"
      description: "Verify searching for a non-existent term shows an appropriate empty state"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the Studio Manager page"
        - "Click on the search input field"
        - "Type a search query that will match nothing (e.g., 'zzz_nonexistent_xyz')"
        - "Verify an empty state or 'no results' message is displayed"
      expected_result: "A no-results or empty state message should be displayed"

    search_clear_restores_results:
      name: "Studio Manager Search Clear Restores List"
      description: "Verify clearing the search input restores the full studio list"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the Studio Manager page"
        - "Observe the initial studio items"
        - "Type a search query to filter results"
        - "Clear the search input field (select all and delete, or click a clear button)"
        - "Verify the full list of studios is restored"
      expected_result: "Clearing the search should restore the original unfiltered studio list"

  # =====================================================================
  # Tooltip Visual Regression
  # Cross-repo coverage: catches divergence between hardcoded tooltip
  # implementations (e.g., note editor Tooltip.jsx) and the token-based
  # design-system tooltip. Each variant tested independently.
  # =====================================================================

  tooltip_visual:
    # --- Standard tooltip ---
    standard_tooltip_renders:
      name: "Standard Tooltip Renders On Hover"
      description: "Verify the standard tooltip appears when hovering over a trigger element"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to a page with standard tooltips (e.g., dashboard, toolbar icons)"
        - "Hover over an element that has a standard tooltip"
        - "Verify the tooltip becomes visible"
        - "Take a screenshot/snapshot of the tooltip for visual comparison"
        - "Verify the tooltip disappears when the cursor moves away"
      expected_result: "Standard tooltip should appear on hover and disappear when cursor leaves"

    standard_tooltip_styling:
      name: "Standard Tooltip Matches Design Tokens"
      description: "Verify the standard tooltip uses design-token colors, border-radius, font-size, and padding"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to a page with standard tooltips"
        - "Hover over an element to trigger a standard tooltip"
        - "Inspect the tooltip element's computed styles"
        - "Verify background-color matches the design token (e.g., dark background like #1a1a1a, #333, or var(--tooltip-bg))"
        - "Verify text color matches the design token (e.g., white or var(--tooltip-text))"
        - "Verify border-radius matches the design token"
        - "Verify font-size matches the design token"
        - "Verify padding matches the design token"
      expected_result: "Standard tooltip computed styles should match the design-system token values"

    standard_tooltip_positioning:
      name: "Standard Tooltip Positions Correctly"
      description: "Verify the standard tooltip positions correctly relative to its trigger (no overlap, no clipping)"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to a page with standard tooltips"
        - "Hover over an element to trigger a tooltip"
        - "Verify the tooltip is positioned near the trigger element (above, below, left, or right)"
        - "Verify the tooltip does not overlap the trigger element"
        - "Verify the tooltip is fully visible within the viewport (not clipped)"
      expected_result: "Tooltip should be correctly positioned near its trigger without overlap or clipping"

    # --- Note editor tooltip (the hardcoded Tooltip.jsx) ---
    note_editor_tooltip_renders:
      name: "Note Editor Tooltip Renders On Hover"
      description: "Verify tooltips in the note editor render when hovering over toolbar actions"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the note editor (open or create a note)"
        - "Locate the note editor toolbar (bold, italic, formatting buttons)"
        - "Hover over a toolbar button that has a tooltip"
        - "Verify the tooltip becomes visible"
        - "Take a screenshot/snapshot of the tooltip for visual comparison"
      expected_result: "Note editor toolbar tooltip should appear on hover"

    note_editor_tooltip_styling:
      name: "Note Editor Tooltip Matches Design Tokens"
      description: "Verify the note editor tooltip uses the same design tokens as the standard tooltip (catches hardcoded divergence)"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the note editor"
        - "Hover over a toolbar button to trigger a tooltip"
        - "Inspect the tooltip element's computed styles"
        - "Verify background-color matches the design-system standard tooltip (not a hardcoded different value)"
        - "Verify text color matches the standard tooltip"
        - "Verify border-radius matches the standard tooltip"
        - "Verify font-size matches the standard tooltip"
        - "Verify padding matches the standard tooltip"
        - "Compare these values against the standard tooltip styles — they must be identical"
      expected_result: "Note editor tooltip styles must match the design-system token-based tooltip exactly"

    note_editor_tooltip_arrow:
      name: "Note Editor Tooltip Arrow Renders"
      description: "Verify the tooltip arrow/caret renders correctly in the note editor"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the note editor"
        - "Hover over a toolbar button to trigger a tooltip"
        - "Verify the tooltip has an arrow/caret element pointing toward the trigger"
        - "Verify the arrow color matches the tooltip background color"
      expected_result: "Tooltip arrow should render and match the tooltip background color"

    # --- Walkthrough tooltip ---
    walkthrough_tooltip_renders:
      name: "Walkthrough Tooltip Renders"
      description: "Verify the walkthrough/onboarding tooltip renders when triggered"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to a page or trigger an onboarding/walkthrough flow that uses walkthrough tooltips"
        - "Verify the walkthrough tooltip is visible"
        - "Verify the tooltip contains step content (text, possibly a step counter)"
        - "Verify navigation controls are present (Next, Previous, Skip, or Close)"
      expected_result: "Walkthrough tooltip should render with content and navigation controls"

    walkthrough_tooltip_styling:
      name: "Walkthrough Tooltip Matches Design Tokens"
      description: "Verify the walkthrough tooltip styling matches design tokens"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Trigger a walkthrough/onboarding tooltip"
        - "Inspect the walkthrough tooltip element's computed styles"
        - "Verify background-color matches the design token for walkthrough tooltips"
        - "Verify text color matches the design token"
        - "Verify border-radius, font-size, and padding are consistent with the design system"
        - "Verify any highlight/overlay around the target element renders correctly"
      expected_result: "Walkthrough tooltip styles should match design-system tokens"

    walkthrough_tooltip_navigation:
      name: "Walkthrough Tooltip Navigation Works"
      description: "Verify Next/Previous/Skip controls work in walkthrough tooltips"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Trigger a walkthrough tooltip flow"
        - "Verify the first step tooltip is visible"
        - "Click 'Next' and verify the tooltip advances to the next step"
        - "Click 'Previous' (if available) and verify the tooltip goes back"
        - "Click 'Skip' or 'Close' and verify the walkthrough dismisses"
      expected_result: "Walkthrough navigation controls should advance, go back, and dismiss correctly"

    # --- Themed tooltip (dark/light mode) ---
    themed_tooltip_light_mode:
      name: "Tooltip Light Mode Styling"
      description: "Verify tooltip styling is correct in light theme"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Ensure the application is in light mode (switch theme if needed)"
        - "Navigate to a page with tooltips"
        - "Hover over an element to trigger a tooltip"
        - "Inspect the tooltip's computed styles"
        - "Verify the tooltip background, text color, and shadow are appropriate for light mode"
        - "Take a screenshot/snapshot for visual comparison"
      expected_result: "Tooltip should use light-mode token values for background, text, and shadow"

    themed_tooltip_dark_mode:
      name: "Tooltip Dark Mode Styling"
      description: "Verify tooltip styling is correct in dark theme"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Switch the application to dark mode"
        - "Navigate to a page with tooltips"
        - "Hover over an element to trigger a tooltip"
        - "Inspect the tooltip's computed styles"
        - "Verify the tooltip background, text color, and shadow are appropriate for dark mode"
        - "Verify dark-mode values differ from light-mode values (not still using light-mode hardcoded colors)"
        - "Take a screenshot/snapshot for visual comparison"
      expected_result: "Tooltip should use dark-mode token values, distinct from light-mode values"

    # --- Cross-surface consistency ---
    tooltip_consistency_dashboard_vs_editor:
      name: "Tooltip Consistency Dashboard vs Note Editor"
      description: "Verify tooltips on the dashboard and in the note editor are visually identical"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the dashboard"
        - "Hover over an element to trigger a standard tooltip"
        - "Record the tooltip's background-color, text color, border-radius, font-size, and padding"
        - "Navigate to the note editor"
        - "Hover over a toolbar button to trigger the note editor tooltip"
        - "Record the tooltip's background-color, text color, border-radius, font-size, and padding"
        - "Compare both sets of values — they must be identical"
      expected_result: "Dashboard tooltip and note editor tooltip should have identical computed styles"

    tooltip_consistency_across_pages:
      name: "Tooltip Consistency Across Pages"
      description: "Verify tooltip styling is consistent across at least three different pages"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the first page (e.g., Dashboard) and trigger a tooltip, record its styles"
        - "Navigate to the second page (e.g., Teams) and trigger a tooltip, record its styles"
        - "Navigate to the third page (e.g., Settings or Studio Manager) and trigger a tooltip, record its styles"
        - "Compare all three sets of styles — they must be consistent"
      expected_result: "Tooltip styles must be identical across all three pages"

  # =====================================================================
  # Password Reset / Recovery
  # =====================================================================

  password_reset:
    # --- Forgot password page UI ---
    forgot_password_link_visible:
      name: "Forgot Password Link Visible"
      description: "Verify the forgot password link is visible on the login page"
      steps:
        - "Navigate to the login page"
        - "Verify a 'Forgot Password', 'Forgot your password?', or 'Reset Password' link is visible on the login page"
      expected_result: "Forgot password link should be visible on the login page"

    forgot_password_page_loads:
      name: "Forgot Password Page Loads"
      description: "Verify clicking the forgot password link navigates to the reset request page"
      steps:
        - "Navigate to the login page"
        - "Click the 'Forgot Password' or 'Reset Password' link"
        - "Verify the forgot password page loads with a heading or title"
        - "Verify an email input field is visible"
        - "Verify a submit/send button is present"
      expected_result: "Forgot password page should load with an email input and submit button"

    forgot_password_submit_valid_email:
      name: "Forgot Password Submit Valid Email"
      description: "Verify submitting a valid email shows a success message"
      steps:
        - "Navigate to the login page"
        - "Click the 'Forgot Password' link"
        - "Enter a valid registered email address"
        - "Click the submit/send button"
        - "Verify a success message is shown (e.g., 'Check your email', 'Reset link sent')"
      expected_result: "Success message should confirm a reset email was sent"

    forgot_password_submit_invalid_email:
      name: "Forgot Password Submit Invalid Email Format"
      description: "Verify submitting an invalid email format shows a validation error"
      steps:
        - "Navigate to the login page"
        - "Click the 'Forgot Password' link"
        - "Enter an invalid email format (e.g., 'not-an-email')"
        - "Click the submit/send button"
        - "Verify a validation error is shown for the invalid email format"
      expected_result: "Validation error should indicate the email format is invalid"

    forgot_password_submit_empty_email:
      name: "Forgot Password Submit Empty Email"
      description: "Verify submitting with an empty email field shows a validation error"
      steps:
        - "Navigate to the login page"
        - "Click the 'Forgot Password' link"
        - "Leave the email field empty"
        - "Click the submit/send button"
        - "Verify a validation error is shown indicating the email is required"
      expected_result: "Validation error should indicate the email field is required"

    forgot_password_unregistered_email:
      name: "Forgot Password Unregistered Email"
      description: "Verify submitting an unregistered email shows an appropriate message"
      steps:
        - "Navigate to the login page"
        - "Click the 'Forgot Password' link"
        - "Enter an email that is not registered (e.g., 'unregistered_user_zzz@example.com')"
        - "Click the submit/send button"
        - "Verify either an error message is shown or a generic success message is shown (some apps show success for security reasons)"
      expected_result: "An appropriate message should be shown (either error or generic success for security)"

    forgot_password_back_to_login:
      name: "Forgot Password Back To Login"
      description: "Verify the user can navigate back to the login page from the forgot password page"
      steps:
        - "Navigate to the login page"
        - "Click the 'Forgot Password' link"
        - "Verify the forgot password page is displayed"
        - "Click the 'Back to Login', 'Sign In', or 'Cancel' link"
        - "Verify the login page is displayed again"
      expected_result: "User should be navigated back to the login page"

    # --- Reset page (token-based, via staging backend hook) ---
    reset_page_loads_with_token:
      name: "Reset Password Page Loads With Token"
      description: "Verify the password reset page loads when accessed with a valid token from the staging backend"
      steps:
        - "Navigate to the login page"
        - "Click the 'Forgot Password' link"
        - "Enter the test account email address"
        - "Click the submit/send button"
        - "Retrieve the reset token from the staging backend API (RESET_TOKEN_API or MAILHOG_API)"
        - "Navigate to the password reset page using the retrieved token URL"
        - "Verify the reset password page loads with a new password input field"
        - "Verify a confirm password input field is present"
        - "Verify a submit/reset button is present"
      expected_result: "Reset password page should load with new password, confirm password fields and a submit button"

    reset_password_success:
      name: "Reset Password Full Flow Success"
      description: "Test the full password reset flow using a token from the staging backend"
      steps:
        - "Navigate to the login page"
        - "Click the 'Forgot Password' link"
        - "Enter the test account email address"
        - "Click the submit/send button"
        - "Retrieve the reset token from the staging backend API (RESET_TOKEN_API or MAILHOG_API)"
        - "Navigate to the password reset page using the retrieved token URL"
        - "Enter a new valid password in the new password field"
        - "Enter the same password in the confirm password field"
        - "Click the submit/reset button"
        - "Verify a success message is shown confirming the password was reset"
        - "Verify the user is redirected to the login page or can log in with the new password"
      expected_result: "Password should be reset successfully and user should be able to log in with the new password"

    reset_password_mismatch:
      name: "Reset Password Mismatch Validation"
      description: "Verify entering mismatched passwords shows a validation error"
      steps:
        - "Navigate to the login page"
        - "Click the 'Forgot Password' link"
        - "Enter the test account email address"
        - "Click the submit/send button"
        - "Retrieve the reset token from the staging backend API"
        - "Navigate to the password reset page using the retrieved token URL"
        - "Enter a password in the new password field"
        - "Enter a different password in the confirm password field"
        - "Click the submit/reset button"
        - "Verify a validation error is shown indicating the passwords do not match"
      expected_result: "Validation error should indicate passwords do not match"

    reset_password_too_short:
      name: "Reset Password Too Short Validation"
      description: "Verify entering a password that is too short shows a validation error"
      steps:
        - "Navigate to the login page"
        - "Click the 'Forgot Password' link"
        - "Enter the test account email address"
        - "Click the submit/send button"
        - "Retrieve the reset token from the staging backend API"
        - "Navigate to the password reset page using the retrieved token URL"
        - "Enter a very short password (e.g., '12') in the new password field"
        - "Enter the same short password in the confirm password field"
        - "Click the submit/reset button"
        - "Verify a validation error is shown indicating the password is too short or does not meet requirements"
      expected_result: "Validation error should indicate the password does not meet minimum requirements"

    reset_password_empty_fields:
      name: "Reset Password Empty Fields Validation"
      description: "Verify submitting the reset form with empty password fields shows validation errors"
      steps:
        - "Navigate to the login page"
        - "Click the 'Forgot Password' link"
        - "Enter the test account email address"
        - "Click the submit/send button"
        - "Retrieve the reset token from the staging backend API"
        - "Navigate to the password reset page using the retrieved token URL"
        - "Leave both password fields empty"
        - "Click the submit/reset button"
        - "Verify validation errors are shown for the required password fields"
      expected_result: "Validation errors should indicate password fields are required"

    reset_password_expired_token:
      name: "Reset Password Expired Token"
      description: "Verify accessing the reset page with an expired or invalid token shows an error"
      steps:
        - "Navigate to the password reset page with an invalid or expired token (e.g., append '?token=invalid_expired_token_xyz' to the reset URL)"
        - "Verify an error message is shown indicating the token is invalid or expired"
        - "Verify a link to request a new reset email is present"
      expected_result: "Error should indicate the reset link is invalid or expired with an option to request a new one"

  # =====================================================================
  # Teams
  # =====================================================================

  teams_page:
    # --- Page rendering (each section isolated) ---
    page_loads_successfully:
      name: "Teams Page Loads"
      description: "Verify the Teams page loads without errors after login"
      steps:
        - "Navigate to the login page"
        - "Enter valid email address and password"
        - "Click login button and verify successful login"
        - "Navigate to the Teams page"
        - "Verify the Teams page has loaded (check for the page title or heading)"
      expected_result: "Teams page should load and display its main heading"

