autoqa:
  # Action configuration
  trigger_tag: "AutoQA"
  test_directory: "tests/autoQA"
  
  # Naming conventions
  naming:
    prefix: "test_autoqa_"
    use_timestamps: true
    use_descriptive_names: true
  
  # Persistence settings
  persistence:
    commit_to_current_branch: true
    commit_message_template: "AutoQA: Add generated test for {scenario_name}"
    never_commit_to_main: true
    auto_cleanup_old_tests: false
    max_tests_per_repo: 100
  
  # Execution settings
  execution:
    run_full_suite_after_generation: true
    retry_count: 2
    timeout_per_test: 300
    staging_only: true
  
  # Reporting
  reporting:
    update_pr_comments: true
    include_screenshots: true
    include_execution_logs: true
    create_github_checks: false
  
  # Security
  security:
    ast_validation: true
    restricted_imports: true
    sandbox_execution: true
    mask_secrets_in_logs: true

# Scenario type mappings
scenario_types:
  login:
    keywords: ["login", "sign in", "authenticate"]
    selectors_key: "login_page"
    default_config:
      timeout: 30000
      headless: true
  
  signup:
    keywords: ["signup", "register", "create account"]
    selectors_key: "signup_page"
    default_config:
      timeout: 45000
      headless: true
  
  dashboard:
    keywords: ["dashboard", "home", "main page"]
    selectors_key: "dashboard_page"
    default_config:
      timeout: 30000
      headless: true
  
  general:
    keywords: []
    selectors_key: "login_page"  # Default fallback
    default_config:
      timeout: 30000
      headless: true

# Cross-repository settings
cross_repo:
  action_repository: "AISquare-Studio/AISquare-Studio-QA"
  action_ref: "main"
  checkout_path: ".autoqa-action"
  
  # Target repository settings
  target:
    test_directory: "tests/autoQA"
    init_file_content: |
      """
      AutoQA Generated Tests
      =====================
      
      This directory contains tests automatically generated by AISquare Studio AutoQA.
      
      Generated tests follow the naming pattern: test_autoqa_*.py
      Each test includes metadata about its generation source and steps.
      
      To regenerate tests, use the AutoQA tag in pull request descriptions.
      """
    
    commit_settings:
      author_name: "AutoQA Bot"
      author_email: "autoqa@aisquare.com"
      branch_protection: true  # Never commit to main/master