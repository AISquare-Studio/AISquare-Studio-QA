name: 🤖 AutoQA Test Generation

on:
  pull_request:
    types: [opened, edited, synchronize]
    # Only run on PRs that contain AutoQA tag
    # Uncomment the line below to enable automatic detection
    # You can also trigger manually via workflow_dispatch
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to generate tests for'
        required: true
        type: string

jobs:
  autoqa:
    name: 🧪 Generate & Execute AutoQA Tests
    runs-on: ubuntu-latest
    # Only run if PR body contains "AutoQA" or manual trigger
    if: contains(github.event.pull_request.body, 'AutoQA') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: 📋 Checkout FE-REACT Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🔍 Get PR Body
        id: pr-body
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # For manual trigger, get PR body via API
            PR_BODY=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.inputs.pr_number }} --jq '.body')
          else
            # For automatic trigger, use event data
            PR_BODY="${{ github.event.pull_request.body }}"
          fi
          
          # Save PR body to output (escape newlines)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$PR_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🤖 Generate AutoQA Tests
        uses: AISquare-Studio/AISquare-Studio-QA@main
        with:
          # Required: OpenAI API key for test generation
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          
          # GitHub token with access to AutoQA repository
          qa-github-token: ${{ secrets.QA_GITHUB_TOKEN }}
          
          # Staging environment configuration
          staging-url: ${{ secrets.STAGING_URL }}
          staging-email: ${{ secrets.STAGING_EMAIL }}
          staging-password: ${{ secrets.STAGING_PASSWORD }}
          
          # Repository and test configuration
          target-repo-path: '.'
          test-directory: 'tests/autoqa'
          
          # Git configuration for commits
          git-user-name: 'AutoQA Bot'
          git-user-email: 'autoqa@aisquare.studio'
          
          # PR body containing AutoQA test steps
          pr-body: ${{ steps.pr-body.outputs.content }}
          
          # Optional: Run existing tests after generating new ones
          run-existing-tests: 'false'
      
      - name: 📊 Comment Test Results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Create comment body
            let commentBody = '## 🤖 AutoQA Test Generation Results\\n\\n';
            
            if ('${{ steps.autoqa.outputs.test_generated }}' === 'true') {
              commentBody += '✅ **Test generation successful!**\\n\\n';
              commentBody += `📁 Generated test file: \`${{ steps.autoqa.outputs.test_file_path }}\`\\n\\n`;
              
              // Add test results if available
              if ('${{ steps.autoqa.outputs.test_results }}') {
                const results = JSON.parse('${{ steps.autoqa.outputs.test_results }}');
                if (results.success) {
                  commentBody += '🧪 **Test execution: PASSED** ✅\\n\\n';
                } else {
                  commentBody += '🧪 **Test execution: FAILED** ❌\\n\\n';
                  commentBody += `Error: \`${results.error}\`\\n\\n`;
                }
              }
              
              commentBody += '### 📋 Next Steps\\n';
              commentBody += '1. Review the generated test file\\n';
              commentBody += '2. Adjust test steps if needed\\n';
              commentBody += '3. Run tests locally: `npm run test:autoqa`\\n';
              commentBody += '4. Commit and push the test file\\n\\n';
              
            } else {
              commentBody += '❌ **Test generation failed**\\n\\n';
              if ('${{ steps.autoqa.outputs.error }}') {
                commentBody += `Error: \`${{ steps.autoqa.outputs.error }}\`\\n\\n`;
              }
              
              commentBody += '### 🔧 Troubleshooting\\n';
              commentBody += '1. Ensure your PR description contains "AutoQA" followed by numbered test steps\\n';
              commentBody += '2. Check that all required secrets are configured\\n';
              commentBody += '3. Verify the staging environment is accessible\\n\\n';
            }
            
            commentBody += '---\\n';
            commentBody += '*Generated by [AutoQA Action](https://github.com/AISquare-Studio/AISquare-Studio-QA)*';
            
            // Post comment
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

  validate-autoqa-format:
    name: 📋 Validate AutoQA Format
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.body, 'AutoQA')
    
    steps:
      - name: 🔍 Check AutoQA Format
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          
          echo "Checking AutoQA format in PR body..."
          
          # Check if AutoQA tag exists
          if echo "$PR_BODY" | grep -q "AutoQA"; then
            echo "✅ AutoQA tag found"
          else
            echo "❌ AutoQA tag not found"
            exit 1
          fi
          
          # Count numbered steps
          STEP_COUNT=$(echo "$PR_BODY" | grep -E '^[0-9]+\.' | wc -l)
          echo "Found $STEP_COUNT numbered test steps"
          
          if [ $STEP_COUNT -ge 3 ]; then
            echo "✅ Sufficient test steps found ($STEP_COUNT)"
          else
            echo "❌ Need at least 3 test steps, found $STEP_COUNT"
            exit 1
          fi
          
          echo "✅ AutoQA format validation passed"